name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to publish (e.g. 0.2.0). Do not include a leading v."
        required: true
        type: string
      dry_run:
        description: "Run checks and version bump preview without publishing"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          V="${V#v}"
          if ! [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: $V"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build packages
        run: bun run build

      - name: Bump package versions
        run: bun run release:bump "${{ steps.ver.outputs.version }}"

      - name: Publish packages
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        env:
          # Prefer secrets.NPM_TOKEN; also accept secrets.NPM_CONFIG_TOKEN if that is what was created.
          # bun publish reads the NPM_CONFIG_TOKEN env var (not NPM_TOKEN / NODE_AUTH_TOKEN).
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_CONFIG_TOKEN }}
        run: |
          if [ -z "$NPM_CONFIG_TOKEN" ]; then
            echo "::error::Set repository secret NPM_TOKEN (or NPM_CONFIG_TOKEN). It is mapped to the NPM_CONFIG_TOKEN env var for bun publish."
            exit 1
          fi
          bun run release:publish

      - name: Dry-run publish preview
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: bun run release:publish --dry-run

      - name: Commit version bumps and tag
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $(git ls-files 'packages/**/package.json')
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: release v${{ steps.ver.outputs.version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
